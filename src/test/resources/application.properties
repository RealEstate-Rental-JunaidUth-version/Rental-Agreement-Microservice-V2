# application-test.properties for RentalAgreement-microservice
spring.cloud.config.enabled=false
spring.profiles.active=dev
spring.application.name=RentalAgreement-microservice

# Local Datasource (H2)
spring.datasource.url=${DEV_DB_RENTAL-AGREEMENT_URL:jdbc:h2:mem:rental_agrement_db}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Web3j / Blockchain configuration
web3j.client-address=${WEB3J_CLIENT_ADDRESS:http://localhost:8545}
contract.rental.address=${CONTRACT_RENTAL_ADDRESS:0x5FbDB2315678afecb367f032d93F642f64180aa3}
wallet.private-key=${WALLET_PRIVATE_KEY:0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}

# Service connection URLs
property.service.url=${PROPERTY_SERVICE_URL:http://localhost:8084}
tenantScoringAiModel.service.url=${TENANT_SCORING_IA_MODEL_URL:http://localhost:8080}

# Kafka configuration
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Management settings
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.endpoint.health.show-details=always
